<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Username To Link</title>

<style>
/* ===========================
   PARADISE LAB UI
=========================== */

body{
    margin:0;
    padding:30px;
    font-family:Inter,Arial,sans-serif;
    background:
    linear-gradient(rgba(5,10,25,.75),rgba(5,10,25,.85)),
    url("https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format&fit=crop")
    center/cover fixed;
}

/* APP */

#utlApp{

    max-width:760px;

    margin:auto;

    color:#fff;
}

/* CONTAINER */

#utlApp .container{

    position:relative;

    overflow:hidden;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:24px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.45),
    0 0 40px rgba(0,255,255,.08);

    animation:fadeUp .5s ease;
}

/* PARADISE LAB */

#utlApp .lab-tag{

    position:absolute;

    top:15px;
    left:15px;

    padding:6px 14px;

    border-radius:50px;

    background:linear-gradient(135deg,#00e5ff,#0091ff);

    color:#fff;

    font-size:11px;

    font-weight:bold;

    letter-spacing:1px;

    text-transform:uppercase;

    box-shadow:
    0 0 8px #00e5ff,
    0 0 18px rgba(0,229,255,.7);

    animation:glow 2s infinite alternate;
}

/* BOX */

#utlApp .box{

    padding:28px;

    border-bottom:1px solid rgba(255,255,255,.12);
}

#utlApp .box:last-child{

    border-bottom:none;
}

/* TITLE */

#utlApp h3{

    margin:0 0 18px;

    text-align:center;

    font-size:24px;

    font-weight:700;

    color:#fff;

    text-shadow:
    0 0 12px rgba(0,229,255,.6);
}

/* TEXTAREA */

#utlApp textarea{

    width:100%;

    box-sizing:border-box;

    resize:vertical;

    min-height:220px;

    padding:16px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,.15);

    outline:none;

    background:rgba(255,255,255,.08);

    color:#fff;

    font-size:15px;

    transition:.25s;
}

#utlApp textarea::placeholder{

    color:#d0d0d0;
}

#utlApp textarea:focus{

    border-color:#00e5ff;

    box-shadow:
    0 0 15px rgba(0,229,255,.45);
}

/* BUTTON */

#utlApp .center{

    text-align:center;
}

#utlApp button{

    margin:6px;

    padding:12px 22px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:#fff;

    font-size:15px;

    font-weight:bold;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    transition:.25s;
}

#utlApp button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 22px rgba(0,114,255,.45);
}

#utlApp button:active{

    transform:scale(.97);
}

/* ANIMATION */

@keyframes glow{

    from{

        box-shadow:
        0 0 6px #00e5ff,
        0 0 12px #00e5ff;
    }

    to{

        box-shadow:
        0 0 14px #00e5ff,
        0 0 28px #00e5ff,
        0 0 40px #00e5ff;
    }
}

@keyframes fadeUp{

    from{

        opacity:0;
        transform:translateY(20px);
    }

    to{

        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:600px){

    body{

        padding:15px;
    }

    #utlApp .box{

        padding:20px;
    }

    #utlApp h3{

        font-size:20px;
    }

    #utlApp button{

        width:100%;
        margin:6px 0;
    }
}
</style>

</head>
<body>

<div id="utlApp">

<div class="container">
   
<div class="lab-tag">Paradise Lab</div>
   
<div class="box">

<h3>USERNAME</h3>

<textarea id="usernames" placeholder="Satu username per baris"></textarea>

</div>

<div class="box center">

<button onclick="buat('facebook')">FACEBOOK</button>

<button onclick="buat('instagram')">INSTAGRAM</button>

<button onclick="buat('threads')">THREADS</button>

<button onclick="copyHasil()">COPY LINK</button>

</div>

<div class="box">

<h3>HASIL LINK</h3>

<textarea id="hasil" readonly></textarea>

</div>

</div>

<script>

function ambilUsername(){

    return document.getElementById("usernames").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x!="");

}

function buat(platform){

    let data=ambilUsername();

    let hasil=[];

    data.forEach(function(user){

        if(platform=="facebook")
            hasil.push("https://www.facebook.com/"+user);

        if(platform=="instagram")
            hasil.push("https://www.instagram.com/"+user);

        if(platform=="threads")
            hasil.push("https://www.threads.com/"+user);

    });

    document.getElementById("hasil").value=hasil.join("\n");

}

function copyHasil(){

    let hasil=document.getElementById("hasil");

    if(hasil.value=="") return;

    navigator.clipboard.writeText(hasil.value);

}

</script>

</body>
</html>

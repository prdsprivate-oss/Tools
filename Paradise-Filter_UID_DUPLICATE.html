<style>
/* =====================================================
   PARADISE LAB PREMIUM UI
   PART 1 - LAYOUT & BACKGROUND
===================================================== */

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,"Segoe UI",Arial,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    padding:20px;

    color:#fff;

    overflow-x:hidden;

    background:
    linear-gradient(
        rgba(5,10,25,.72),
        rgba(5,10,25,.82)
    ),
    url("https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1600&auto=format&fit=crop")

}

/* ===========================
   BACKGROUND AURORA
=========================== */

body::before{

    content:"";

    position:fixed;

    inset:-25%;

    z-index:-2;

    pointer-events:none;

    background:

    radial-gradient(circle at 20% 20%,
    rgba(0,255,255,.18),
    transparent 28%),

    rgba(0,120,255,.18),
    transparent 30%),

    radial-gradient(circle at 50% 50%,
    rgba(0,255,170,.12),

}

@keyframes auroraMove{

    from{

        transform:rotate(0deg) scale(1.15);
    }

    to{

        transform:rotate(360deg) scale(1.15);
    }

}

/* ===========================
   CONTAINER
=========================== */

    position:relative;

    width:100%;

    max-width:1700px;

    margin:auto;

    padding:22px;

    border-radius:24px;

    0 20px 60px rgba(0,0,0,.45),

}

/* Glow Border */

    content:"";

    position:absolute;

    inset:0;

    border-radius:24px;

    background:

    linear-gradient(
        135deg,
        rgba(0,255,255,.45),
        transparent,
        rgba(0,120,255,.45)
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;

    pointer-events:none;
}

/* ===========================
   PARADISE BADGE
=========================== */

    content:"🚀  PARADISE LAB";

======================================*/

</head>
<body>

<div class="container">

    <div class="title">
        UID DUPLICATE FILTER PRO
    </div>

    <div class="mainRow">

        <!-- DATABASE -->
        <div class="box">

            <div class="counter" id="count1">
                0 UID
            </div>

            <label class="label">
                DATABASE UID
            </label>

            <textarea
                id="oldUid"
                placeholder="Masukkan database UID lama di sini..."
            ></textarea>

        </div>

        <!-- PANEL -->
        <div class="middlePanel">

            <!-- IMPORT DATABASE -->
            <button
                class="importBtn"
                onclick="importDatabaseFile()"
            >
                IMPORT DB .TXT
            </button>

            <!-- IMPORT UID BARU -->
            <button
                class="importBtn"
                onclick="document.getElementById('importNew').click()"
            >
                IMPORT UID BARU
            </button>

            <input
                type="file"
                id="importNew"
                accept=".txt"
            >

            <!-- FILTER -->
            <button
                class="filterBtn"
                onclick="filterDuplicate()"
            >
                FILTER DUPLIKAT
            </button>

            <!-- EXPORT -->
            <button
                class="exportBtn"
                onclick="exportResult()"
            >
                EXPORT HASIL .TXT
            </button>

            <!-- COPY -->
            <button
                class="copyBtn"
                onclick="copyResult()"
            >
                COPY HASIL
            </button>

            <!-- CLEAR -->
            <button
                class="clearBtn"
                onclick="clearAll()"
            >
                CLEAR SEMUA
            </button>

            <!-- STATS -->
            <div class="stats">

                <div class="card">
                    <h3>UID BARU</h3>
                    <p id="uniqueCount">0</p>
                </div>

                <div class="card">
                    <h3>DUPLIKAT</h3>
                    <p id="dupCount">0</p>
                </div>

                <div class="card">
                    <h3>TOTAL DB</h3>
                    <p id="dbCount">0</p>
                </div>

            </div>

        </div>

        <!-- UID BARU -->
        <div class="box">

            <div class="counter" id="count2">
                0 UID
            </div>

            <label class="label">
                UID BARU
            </label>

            <textarea
                id="newUid"
                placeholder="Masukkan UID baru di sini..."
            ></textarea>

        </div>

        <!-- HASIL -->
        <div class="box">

            <div class="counter" id="count3">
                0 UID
            </div>

            <label class="label">
                HASIL UID BERSIH
            </label>

            <textarea
                id="result"
                placeholder="Hasil filter muncul di sini..."
            ></textarea>

        </div>

    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SAVE BAR -->
<div class="saveBar" id="saveBar">
    AUTO SAVED
</div>

<script>

const oldUid = document.getElementById("oldUid");
const newUid = document.getElementById("newUid");
const result = document.getElementById("result");

/* STORAGE KEY */
const STORAGE_KEY =
    "uid_duplicate_filter_data";

/* FILE HANDLE */
let databaseFileHandle = null;

/* NORMALIZE */
function normalize(text){

    return text
        .split(/\r?\n/)
        .map(v => v.trim())
        .filter(v => v !== "");
}

/* UPDATE COUNTER */
function updateCounts(){

    const oldCount =
        normalize(oldUid.value).length;

    const newCount =
        normalize(newUid.value).length;

    const resultCount =
        normalize(result.value).length;

    document.getElementById("count1").innerText =
        oldCount + " UID";

    document.getElementById("count2").innerText =
        newCount + " UID";

    document.getElementById("count3").innerText =
        resultCount + " UID";

    document.getElementById("dbCount").innerText =
        oldCount;
}

/* SAVE LOCAL STORAGE */
function saveToBrowser(){

    const data = {

        database : oldUid.value,
        newuid   : newUid.value,
        result   : result.value

    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );
}

/* LOAD LOCAL STORAGE */
function loadFromBrowser(){

    const saved =
        localStorage.getItem(STORAGE_KEY);

    if(!saved) return;

    try{

        const data =
            JSON.parse(saved);

        oldUid.value =
            data.database || "";

        newUid.value =
            data.newuid || "";

        result.value =
            data.result || "";

        updateCounts();

        showToast(
            "Auto restore berhasil!"
        );

    }catch(err){

        console.log(err);
    }
}

/* SHOW TOAST */
function showToast(text){

    const toast =
        document.getElementById("toast");

    toast.innerText = text;

    toast.classList.add("show");

    setTimeout(()=>{

        toast.classList.remove("show");

    },2500);
}

/* SHOW SAVE BAR */
function showSaveBar(){

    const saveBar =
        document.getElementById("saveBar");

    const now = new Date();

    const time =
        now.toLocaleTimeString();

    saveBar.innerText =
        "AUTO SAVED • " + time;

    saveBar.classList.add("show");

    setTimeout(()=>{

        saveBar.classList.remove("show");

    },2000);
}

/* IMPORT DATABASE FILE */
async function importDatabaseFile(){

    try{

        const [fileHandle] =
            await window.showOpenFilePicker({

            types: [{
                description: "Text Files",
                accept: {
                    "text/plain": [".txt"]
                }
            }],

            multiple:false

        });

        databaseFileHandle = fileHandle;

        const file =
            await fileHandle.getFile();

        const text =
            await file.text();

        oldUid.value = text;

        updateCounts();

        saveToBrowser();

        showToast(
            "Database terhubung!"
        );

    }catch(err){

        console.log(err);
    }
}

/* AUTO SAVE DATABASE */
async function saveDatabaseDirect(){

    if(!databaseFileHandle) return;

    try{

        const writable =
            await databaseFileHandle.createWritable();

        await writable.write(oldUid.value);

        await writable.close();

        showSaveBar();

        console.log(
            "Database auto saved"
        );

    }catch(err){

        console.log(err);
    }
}

/* LISTENER AUTO SAVE */
oldUid.addEventListener("input", () => {

    updateCounts();

    saveToBrowser();
});

newUid.addEventListener("input", () => {

    updateCounts();

    saveToBrowser();
});

result.addEventListener("input", () => {

    updateCounts();

    saveToBrowser();
});

/* FILTER */
async function filterDuplicate(){

    const oldList = normalize(oldUid.value);
    const newList = normalize(newUid.value);

    const oldSet = new Set(oldList);

    const clean = [];

    let duplicate = 0;

    for(let uid of newList){

        if(oldSet.has(uid)){

            duplicate++;

        }else{

            clean.push(uid);

            oldSet.add(uid);
        }
    }

    /* HASIL */
    result.value = clean.join("\n");

    /* TAMBAH DATABASE */
    const updatedDatabase = [
        ...oldList,
        ...clean
    ];

    oldUid.value =
        updatedDatabase.join("\n");

    /* KOSONGKAN UID BARU */
    newUid.value = "";

    /* UPDATE STATS */
    document.getElementById("uniqueCount").innerText =
        clean.length;

    document.getElementById("dupCount").innerText =
        duplicate;

    updateCounts();

    saveToBrowser();

    /* AUTO SAVE FILE ASLI */
    await saveDatabaseDirect();

    showToast(
        "Selesai! " +
        clean.length +
        " UID ditambahkan"
    );
}

/* COPY */
function copyResult(){

    navigator.clipboard.writeText(result.value);

    showToast("Hasil berhasil di copy!");
}

/* EXPORT TXT */
function exportResult(){

    const text = result.value;

    if(!text.trim()){

        showToast("Hasil masih kosong!");

        return;
    }

    const blob = new Blob(
        [text],
        {type:"text/plain"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download =
        "hasil_uid_bersih.txt";

    a.click();

    showToast("Hasil berhasil di export!");
}

/* IMPORT UID BARU TXT */
document
.getElementById("importNew")
.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        newUid.value =
            event.target.result;

        updateCounts();

        saveToBrowser();

        showToast(
            "UID baru berhasil di import!"
        );
    };

    reader.readAsText(file);
});

/* CLEAR */
function clearAll(){

    oldUid.value = "";
    newUid.value = "";
    result.value = "";

    document.getElementById("uniqueCount").innerText = 0;
    document.getElementById("dupCount").innerText = 0;
    document.getElementById("dbCount").innerText = 0;

    updateCounts();

    saveToBrowser();

    showToast("Semua data dibersihkan!");
}

/* INIT */
updateCounts();

/* AUTO LOAD */
loadFromBrowser();

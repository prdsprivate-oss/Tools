/* ===========================

*{
    margin:0;

}

body{

    padding:25px;

    center center/cover fixed;
}

/* ========================= */

.box{

    position:relative;

    width:100%;
    max-width:720px;

    padding:28px;

    border-radius:22px;

    background:rgba(28,32,48,.88);

    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(18px);

    box-shadow:
    0 15px 40px rgba(0,0,0,.45);
}

/* ========================= */

.box::before{

    content:"PARADISE LAB";

    position:absolute;

    top:18px;
    left:18px;

    background:#00bfff;

    color:#fff;

    padding:6px 14px;

    border-radius:30px;

    font-size:11px;

    font-weight:bold;

    letter-spacing:1px;

    box-shadow:
    0 0 12px #00bfff,
    0 0 25px #00bfff;
}

/* ========================= */

select,
textarea{

    width:100%;

    margin-top:55px;

    padding:14px 16px;

    border-radius:12px;

    border:2px solid #18d7ff;

    background:#35394b;

    color:#fff;

    font-size:15px;

    outline:none;

    transition:.25s;
}

/* textarea berikutnya */

textarea{

    margin-top:16px;

    height:220px;

    resize:none;
}

textarea::placeholder{

    color:#bfc5d4;
}

/* ========================= */

select:focus,
textarea:focus{

    border-color:#00ffff;

    box-shadow:
    0 0 15px rgba(0,255,255,.45);
}

/* ========================= */

select option{

    background:#35394b;

    color:#ffffff;
}

/* ========================= */

button{

    width:100%;

    margin-top:15px;

    padding:15px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:15px;

    font-weight:bold;

    color:#fff;

    background:linear-gradient(135deg,#00bfff,#0066ff);

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(0,150,255,.45);
}

button:active{

    transform:scale(.98);
}

/* ========================= */

#out{

    height:90px;

    line-height:1.5;
}

/* ========================= */

#toast{

    position:fixed;

    left:50%;
    bottom:35px;

    transform:translateX(-50%);

    background:rgba(20,20,25,.95);

    color:#fff;

    padding:12px 22px;

    border-radius:40px;

    font-size:14px;

    opacity:0;

    transition:.3s;

    box-shadow:
    0 10px 30px rgba(0,0,0,.45);
}

#toast.show{

    opacity:1;

    transform:translateX(-50%) translateY(-10px);
}

/* ========================= */

::-webkit-scrollbar{

    width:8px;
}

::-webkit-scrollbar-thumb{

    background:#00bfff;

    border-radius:30px;
}

/* ========================= */

@media(max-width:700px){

    body{

        padding:15px;
    }

    .box{

        padding:20px;
    }

}</style>

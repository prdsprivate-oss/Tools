body{

/*==========================

/*==========================

}

/*==========================
        ROW
===========================*/

.row{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:22px;

    margin-bottom:22px;

}
.row3{

    grid-template-columns:repeat(3,1fr);

}
/*==========================
        PANEL
===========================*/

.panel{

    background:rgba(15,24,44,.72);

    backdrop-filter:blur(15px);

    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.10);

    border-radius:20px;

    padding:22px;

    margin-bottom:22px;

    box-shadow:

    0 15px 40px rgba(0,0,0,.35),

    0 0 18px rgba(0,180,255,.08);

    transition:.25s;

}

.panel:hover{

    transform:translateY(-3px);

    box-shadow:

    0 18px 45px rgba(0,0,0,.45),

    0 0 25px rgba(0,212,255,.15);

}

/*==========================
      PANEL TITLE
===========================*/

.panel-title{

    font-size:18px;

    font-weight:700;

    margin-bottom:14px;

    color:#ffffff;

    letter-spacing:.5px;

}

/*==========================
       TEXTAREA
===========================*/

textarea{

    width:100%;

    resize:none;

    border:none;

    outline:none;

    border-radius:14px;

    background:#081425;

    color:#ffffff;

    padding:16px;

    font-size:14px;

    line-height:1.6;

    border:1px solid rgba(255,255,255,.08);

    transition:.25s;

}

textarea:focus{

    border-color:#00d4ff;

    box-shadow:0 0 15px rgba(0,212,255,.35);

}

#l1,
#l2,
#l3{

    height:250px;

}

#status{

    height:90px;

}

#db{

    height:230px;

}

#hasil{

    height:150px;

}

/*==========================
      INPUT NUMBER
===========================*/

input[type=number]{

    width:80px;

    padding:10px;

    border:none;

    outline:none;

    border-radius:10px;

    background:#081425;

    color:#fff;

    border:1px solid rgba(255,255,255,.08);

}

/*==========================
      LABEL
===========================*/

.option-group{

    display:flex;

    gap:30px;

    margin-top:15px;

    margin-bottom:15px;

}

.check{

    display:block;

    margin-bottom:18px;

}

label{

    color:#fff;

    font-size:14px;

}

input[type=radio],
input[type=checkbox]{

    margin-right:8px;

}

/*==========================
        TOOLBAR
===========================*/

.toolbar{

    display:flex;

    align-items:center;

    gap:12px;

    margin-top:16px;

    flex-wrap:wrap;

}

.button-row{

    display:flex;

    gap:12px;

    margin-top:16px;

}

.button-row button{

    flex:1;

}

/*==========================
        BUTTON
===========================*/

button{

    padding:13px 20px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:#fff;

    font-weight:bold;

    font-size:14px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    transition:.25s;

}

button:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 22px rgba(0,114,255,.35);

}

button:active{

    transform:scale(.98);

}

/* tombol khusus */

#cut{

    width:100%;

    background:linear-gradient(135deg,#00d26a,#009245);

}

#gas{

    background:linear-gradient(135deg,#ff9800,#ef6c00);

}

#copy{

    background:linear-gradient(135deg,#00c853,#009624);

}

#clear{

    background:linear-gradient(135deg,#ff5252,#d50000);

}

/*==========================
        TOAST
===========================*/

#toast{

    position:fixed;

    right:25px;

    bottom:25px;

    background:rgba(10,20,40,.92);

    color:#fff;

    padding:14px 22px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    opacity:0;

    transform:translateY(20px);

    transition:.3s;

    z-index:9999;

}

#toast.show{

    opacity:1;

    transform:translateY(0);

}

/*==========================
      SCROLLBAR
===========================*/

textarea::-webkit-scrollbar{

    width:10px;

}

textarea::-webkit-scrollbar-track{

    background:#081425;

}

textarea::-webkit-scrollbar-thumb{

    border-radius:20px;

    background:linear-gradient(#00d4ff,#0072ff);

}

/*==========================
      MOBILE
===========================*/

@media(max-width:900px){

    body{

        padding:15px;

    }

    .row{

        grid-template-columns:1fr;

    }

    .toolbar{

        flex-direction:column;

        align-items:stretch;

    }

    .button-row{

        flex-direction:column;

    }

    input[type=number]{

        width:100%;

    }

}

/* ==========================
      BUTTON PREMIUM
========================== */

button{

    position:relative;

    overflow:hidden;

}

button::before{

    content:"";

    position:absolute;

    top:0;

    left:-120%;

    width:60px;

    height:100%;

    transform:skewX(-25deg);

    background:rgba(255,255,255,.22);

    transition:.8s;

}

button:hover::before{

    left:160%;

}


/* ==========================
      BADGE EFFECT
========================== */

.badge{

    position:relative;

    overflow:hidden;

    animation:badgeGlow 3.5s ease-in-out infinite;

}

@keyframes badgeGlow{

    0%,100%{

        box-shadow:
        0 0 10px rgba(0,212,255,.25);

    }

    50%{

        box-shadow:
        0 0 18px rgba(0,212,255,.55),
        0 0 30px rgba(0,212,255,.18);

    }

}

.badge::after{

    content:"";

    position:absolute;

    top:-70%;

    left:-120%;

    width:45%;

    height:250%;

    transform:rotate(25deg);

    background:linear-gradient(

        transparent,

        rgba(255,255,255,.45),

        transparent

    );

    animation:badgeShine 6s linear infinite;

}

@keyframes badgeShine{

    0%{

        left:-120%;

    }

    20%{

        left:150%;

    }

    100%{

        left:150%;

    }

}

.badge{

    transition:.25s;

}

.badge:hover{

    transform:translateY(-2px) scale(1.03);

}

/* ==========================
      TITLE EFFECT
========================== */

.header h1{

    animation:titleGlow 3s ease-in-out infinite alternate;

}

@keyframes titleGlow{

    from{

        text-shadow:

        0 0 8px rgba(0,212,255,.35);

    }

    to{

        0 0 20px rgba(0,212,255,.9),

    }

}

textarea{

textarea:hover{

<div id="toast"></div>

<script>
/*==========================================
 PARADISE MANAGER V3
 PART 1 - CORE
==========================================*/

const $ = id => document.getElementById(id);

const APP = {

    links: ['l1','l2','l3'],

    save(id){
        const el=$(id);
        if(el) localStorage.setItem(id,el.value);
    },

    load(id){
        const el=$(id);
        if(el) el.value=localStorage.getItem(id)||'';
    },

    count(id){
        const el=$(id);
        if(!el) return 0;

        return el.value
            .split(/\n/)
            .filter(v=>v.trim())
            .length;
    }

};
/*==========================================
 TOAST
==========================================*/

function toast(text){

    const t=$('toast');

    if(!t) return;

    t.textContent=text;

    t.classList.add('show');

    clearTimeout(window.toastTimer);

    window.toastTimer=setTimeout(()=>{

        t.classList.remove('show');

    },1500);

}
/*==========================================
 STORAGE
==========================================*/

APP.links.forEach(id=>{

    APP.load(id);

    const el=$(id);

    if(!el) return;

    el.addEventListener('input',()=>{

        APP.save(id);

        refreshUI();

    });

});

APP.load('status');

if($('status')){

    $('status').addEventListener('input',()=>{

        APP.save('status');

    });

}

/*==========================================
 COUNTER
==========================================*/

function updateCounter(){

    $('t1').textContent=APP.count('l1');

    $('t2').textContent=APP.count('l2');

    $('t3').textContent=APP.count('l3');

}
/*==========================================
 ACTIVE LINK
==========================================*/

function activeTextarea(){

    if($('r3').checked) return $('l3');

    if($('r2').checked) return $('l2');

    return $('l1');

}
/*==========================================
 BUTTON COUNTER
==========================================*/

function updateButtons(){

    const total=APP.count(activeTextarea().id);

    $('cut').textContent=
        'CUT LINK ('+total+')';

    $('cut1').textContent=
        'CUT LINK 1 ('+APP.count('l1')+')';

    $('cut2').textContent=
        'CUT LINK 2 ('+APP.count('l2')+')';

    $('cut3').textContent=
        'CUT LINK 3 ('+APP.count('l3')+')';

}
/*==========================================
 REFRESH UI
==========================================*/

function refreshUI(){

    updateCounter();

    updateButtons();

}
/*==========================================
 RADIO
==========================================*/

['r1','r2','r3'].forEach(id=>{

    const radio=$(id);

    if(!radio) return;

    radio.addEventListener(

        'change',

        ()=>{

            localStorage.setItem(

                'src',

                id

            );

            refreshUI();

        }

    );

});
/*==========================================
 LOAD RADIO
==========================================*/

const lastRadio=

localStorage.getItem('src');

if($(lastRadio)){

    $(lastRadio).checked=true;

}else{

    $('r1').checked=true;

}
refreshUI();

/*==========================================
 CUT ENGINE
==========================================*/

function cutFrom(textarea){

    let arr=textarea.value
        .split(/\n/)
        .filter(v=>v.trim());

    if(!arr.length){

        toast('Link kosong');

        return;

    }

    let link=arr.shift();

    textarea.value=arr.join('\n');

    APP.save(textarea.id);

	let hasil=link;

	if($('inc').checked){

		if(!$('status').value.trim()){

			generateStatus();

		}

		if($('status').value.trim()){

			hasil=
				$('status').value.trim()
				+' ➢ '+
				link;

			$('status').value='';

			APP.save('status');

		}

	}
	
    navigator.clipboard
    .writeText(hasil)
    .then(()=>{

        toast('Berhasil dicopy');

        refreshUI();

    })
    .catch(()=>{

        toast('Gagal copy');

    });

}

/*==========================================
 CUT BUTTONS
==========================================*/

$('cut').onclick=()=>{

    cutFrom(

        activeTextarea()

    );

};

$('cut1').onclick=()=>{

    cutFrom(

        $('l1')

    );

};

$('cut2').onclick=()=>{

    cutFrom(

        $('l2')

    );

};

$('cut3').onclick=()=>{

    cutFrom(

        $('l3')

    );

};

/*==========================================
 DATABASE
==========================================*/

function updateDBCount(){

    $('dbCount').textContent=
        APP.count('db');

}

APP.load('db');

$('db').addEventListener(

    'input',

    ()=>{

        APP.save('db');

        updateDBCount();

    }

);

/*==========================================
 SETTINGS
==========================================*/

[
'hasil',
'jumlah',
'hapusJumlah',
'cutJumlah'

].forEach(id=>{

    APP.load(id);

    const el=$(id);

    if(!el) return;

    el.addEventListener(

        'input',

        ()=>{

            APP.save(id);

        }

    );

});
/*==========================================
 COPY & CLEAR
==========================================*/

$('copy').onclick=()=>{

    navigator.clipboard.writeText(

        $('hasil').value

    ).then(()=>{

        toast('Berhasil dicopy');

    });

};

/*==========================================*
COPY STATUS
*==========================================*/

$('copyStatus').onclick=()=>{

    const text=$('status').value.trim();

    if(!text){

        toast('Status kosong');

        return;

    }

    navigator.clipboard

    .writeText(text)

    .then(()=>{

        toast('Status berhasil dicopy');

    })

    .catch(()=>{

        toast('Gagal copy');

    });

};

$('clear').onclick=()=>{

    $('hasil').value='';

    APP.save('hasil');

    toast('Hasil dibersihkan');

};
updateDBCount();

/*==========================================
 RANDOM
==========================================*/

$('gas').onclick=()=>{

    let arr=$('db').value
        .split(/\n/)
        .filter(v=>v.trim());

    if(!arr.length){

        toast('Database kosong');

        return;

    }

    let total=parseInt($('jumlah').value)||1;

    if(total>arr.length) total=arr.length;

    arr.sort(()=>Math.random()-0.5);

    $('hasil').value=
        arr.slice(0,total).join('\n');

    APP.save('hasil');

    toast('Random selesai');

};

/*==========================================
 HAPUS ATAS
==========================================*/

$('hapusAtas').onclick=()=>{

    let arr=$('db').value
        .split(/\n/)
        .filter(v=>v.trim());

    let total=parseInt($('hapusJumlah').value)||1;

    arr.splice(0,total);

    $('db').value=arr.join('\n');

    APP.save('db');

    updateDBCount();

    toast('Data dihapus');

};

/*==========================================
 CUT ATAS
==========================================*/

$('cutAtas').onclick=()=>{

    let arr=$('db').value
        .split(/\n/)
        .filter(v=>v.trim());

    let total=parseInt($('cutJumlah').value)||1;

    let hasil=arr.splice(0,total);

    $('hasil').value=hasil.join('\n');

    $('db').value=arr.join('\n');

    APP.save('hasil');

    APP.save('db');

    updateDBCount();

    navigator.clipboard.writeText(

        $('hasil').value

    ).then(()=>{

        toast('Cut selesai');

    });

};

/*==========================================
 USA CLOCK
==========================================*/

function updateUSClock(){

    const el=$('usaClock');

    if(!el) return;

	const now = new Date();

	$("usaDate").textContent = now.toLocaleDateString(
		"en-US",
		{
			timeZone:"America/New_York",
			weekday:"short",
			year:"numeric",
			month:"short",
			day:"2-digit"
		}
	);

	$("usaTime").textContent = now.toLocaleTimeString(
		"en-US",
		{
			timeZone:"America/New_York",
			hour:"2-digit",
			minute:"2-digit",
			second:"2-digit",
			hour12:false
		}
	);

}

updateUSClock();

setInterval(updateUSClock,1000);

/*==========================================
 ENTER NUMBER ONLY
==========================================*/

[
'jumlah',
'hapusJumlah',
'cutJumlah'

].forEach(id=>{

    const el=$(id);

    if(!el) return;

    el.addEventListener('input',()=>{

        el.value=el.value.replace(/\D/g,'');

    });

});

 AUTO FOCUS
==========================================*/

window.onload=()=>{

    if($('l1'))

        $('l1').focus();

};

/*==========================================
 SHORTCUT
==========================================*/

document.addEventListener(

'keydown',

e=>{

    if(e.ctrlKey && e.key==='1'){

        $('cut1').click();

    }

    if(e.ctrlKey && e.key==='2'){

        $('cut2').click();

    }

    if(e.ctrlKey && e.key==='3'){

        $('cut3').click();

    }

    if(e.ctrlKey && e.key==='r'){

        $('gas').click();

/*==========================================
 STARTUP
==========================================*/

refreshUI();

updateDBCount();

/*==========================================*
STATUS DATABASE
*==========================================*/

APP.load('statusDB');

if($('statusDB')){

    $('statusDB').addEventListener(

        'input',

        ()=>{

            APP.save('statusDB');

			statusPool=[];
			
            updateStatusCount();

        }

    );

}

function updateStatusCount(){

    const total=

    $('statusDB').value

    .split(/\n-\n|\r\n-\r\n|\n-\r|\r-\n/)

    .filter(v=>v.trim())

    .length;

    $('statusCount').textContent=total;

}

updateStatusCount();

/*==========================================*
STATUS GENERATE
*==========================================*/

let statusPool=[];

function buildStatusPool(){

    statusPool=$('statusDB').value

    .split(/\n-\n|\r\n-\r\n|\n-\r|\r-\n/)

    .map(v=>v.trim())

    .filter(v=>v);

    // acak urutan sekali saja
    statusPool.sort(()=>Math.random()-0.5);

}
function generateStatus(){

    // Kalau pool habis, isi ulang
    if(statusPool.length===0){

        buildStatusPool();

    }

    // Kalau database memang kosong
    if(statusPool.length===0){

        toast('Status Database kosong');

        return false;

    }

    // Ambil satu status secara acak
    const index=Math.floor(

        Math.random()*statusPool.length

    );

    const status=statusPool.splice(index,1)[0];

    $('status').value=status;

    APP.save('status');

    // Kalau status terakhir baru saja dipakai,
    // siapkan pool baru untuk generate berikutnya
    if(statusPool.length===0){

        buildStatusPool();

    }

    return true;

}
$('genStatus').onclick=()=>{

    generateStatus();

};


$('clearStatusDB').onclick=()=>{

    $('statusDB').value='';

    APP.save('statusDB');

	statusPool=[];

    updateStatusCount();

    toast('Status Database dikosongkan');

};


toast('Paradise Manager Auto Update Ready');

</script>

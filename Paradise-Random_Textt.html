<style>
/* ===========================
   PARADISE APP - PREMIUM UI
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;

    background:
    linear-gradient(rgba(10,15,30,.55),rgba(5,10,25,.75)),
    url("https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format&fit=crop")
    center center/cover no-repeat fixed;
}

/* Blur Glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    radial-gradient(circle at 15% 20%,rgba(0,255,255,.18),transparent 30%),
    radial-gradient(circle at 85% 80%,rgba(255,0,255,.15),transparent 30%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.05),transparent 45%);
}

/* APP */

#paradise-app{
    width:100%;
    display:flex;
    justify-content:center;
    padding:40px 15px;
}

#paradise-app .container{

    width:100%;
    max-width:700px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.18);

    border-radius:24px;

    padding:28px;

    box-shadow:
    0 15px 45px rgba(0,0,0,.45),
    0 0 40px rgba(0,255,255,.08);

    animation:fadeUp .6s ease;
}

/* TITLE */

.title{
    text-align:center;
    color:#fff;
    font-size:32px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:25px;

    text-shadow:
    0 0 10px #00d9ff,
    0 0 25px rgba(0,217,255,.4);
}

/* INPUT */

select,
textarea,
button{

    width:100%;
    margin-top:14px;

    border:none;
    outline:none;

    border-radius:14px;

    padding:15px 16px;

    font-size:15px;
}

select,
textarea{

    background:rgba(255,255,255,.12);

    color:#fff;

    border:1px solid rgba(255,255,255,.15);

    transition:.25s;
}

textarea::placeholder{
    color:#ddd;
}

select:focus,
textarea:focus{

    border-color:#00e5ff;

    box-shadow:
    0 0 15px rgba(0,229,255,.45);
}

/* BUTTON */

button{

    margin-top:18px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 25px rgba(0,114,255,.45);
}

button:active{

    transform:scale(.98);
}

/* CHECKBOX */

label{

    margin-top:15px;

    display:flex;

    align-items:center;

    gap:10px;

    color:white;

    cursor:pointer;

    font-size:15px;
}

input[type=checkbox]{

    width:20px;
    height:20px;

    accent-color:#00d9ff;

    cursor:pointer;
}

/* NOTIFICATION */

#notif{

    position:fixed;

    top:25px;
    right:25px;

    background:linear-gradient(135deg,#00c853,#00e676);

    color:#fff;

    padding:14px 22px;

    border-radius:14px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);

    transform:translateX(120%);

    transition:.35s;

    z-index:99999;
}

#notif.show{

    transform:translateX(0);
}

/* LOADING */

#loading{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(5px);

    color:#fff;

    font-size:22px;

    opacity:0;

    pointer-events:none;

    transition:.3s;

    z-index:999999;
}

#loading.show{

    opacity:1;

    pointer-events:auto;
}

/* SCROLL */

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#00c6ff;

    border-radius:50px;
}

::-webkit-scrollbar-track{

    background:rgba(255,255,255,.08);
}

/* ANIMATION */

@keyframes fadeUp{

    from{

        opacity:0;
        transform:translateY(30px);
    }

    to{

        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:600px){

    .container{

        padding:20px;
    }

    .title{

        font-size:25px;
    }

}
</style>
</head>

const category = document.getElementById("category").value;
const result = document.getElementById("result");
const useEmoji = document.getElementById("useEmoji").checked;

if(!lang){
    alert("Pilih bahasa dulu!");
    return;
}

if(!category){
    alert("Pilih kategori dulu!");
    return;
}

showLoading(true);

let text = database[category][Math.floor(Math.random() * database[category].length)];

try{

if(lang !== "id"){
    const response = await fetch(
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=id&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`
    );

    const data = await response.json();
    text = data[0][0][0];
}

/* 🔥 EMOJI PREFIX */
if(useEmoji){
    text = getEmoji() + " " + text;
}

result.value = text;

}catch(e){
    result.value = "Gagal translate.";
}

showLoading(false);

}

/* COPY */
function copyText(){

const text = document.getElementById("result");
if(!text.value.trim()) return;

text.select();
document.execCommand("copy");

const notif = document.getElementById("notif");
notif.classList.add("show");

setTimeout(()=>{
    notif.classList.remove("show");
},2000);

}

</script>

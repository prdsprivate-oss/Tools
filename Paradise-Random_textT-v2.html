/*=========================================
        PARADISE LAB PREMIUM
              PART 2
=========================================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Segoe UI",Arial,sans-serif;

    min-height:100vh;

    padding:30px;

    background:
    linear-gradient(rgba(4,12,28,.78),rgba(4,12,28,.90)),
    url("https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2000&auto=format&fit=crop")
    center/cover fixed;

}

/*=========================
        APP
=========================*/

#paradise-app{

    display:flex;

    justify-content:center;

}

/*=========================
      CONTAINER
=========================*/

#paradise-app .container{

    width:100%;

    max-width:720px;

    background:rgba(12,22,42,.72);

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:22px;

    padding:30px;

    box-shadow:

    0 20px 45px rgba(0,0,0,.35);

}

/*=========================
        HEADER
=========================*/

.header{

    position:relative;

    text-align:center;

    margin-bottom:30px;

    padding-top:10px;

}

.badge{

    position:absolute;

    top:0;

    left:0;

    padding:8px 18px;

    border-radius:50px;

    background:

    linear-gradient(135deg,#00d4ff,#006eff);

    color:#fff;

    font-size:12px;

    font-weight:bold;

    letter-spacing:1px;

    box-shadow:

    0 0 18px rgba(0,212,255,.35);

}

.title{

    color:#fff;

    font-size:34px;

    font-weight:800;

    margin-bottom:8px;

    text-shadow:

    0 0 12px rgba(0,212,255,.30);

}

.subtitle{

    color:#b6c7df;

    font-size:15px;

}

/*=========================
        SECTION
=========================*/

.section{

    margin-bottom:22px;

}

.label{

    color:#fff;

    font-size:14px;

    font-weight:600;

    margin-bottom:8px;

}

/*=========================
      SELECT
=========================*/

select{

    width:100%;

    padding:14px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,.08);

    background:#081425;

    color:#fff;

    font-size:15px;

    outline:none;

    transition:.25s;

}

select:focus{

    border-color:#00d4ff;

    box-shadow:

    0 0 15px rgba(0,212,255,.30);

}

select option{

    background:#081425;

    color:#fff;

}

/*=========================
      TEXTAREA
=========================*/

textarea{

    width:100%;

    min-height:210px;

    resize:none;

    border:none;

    outline:none;

    border-radius:14px;

    background:#081425;

    color:#fff;

    padding:16px;

    font-size:14px;

    line-height:1.6;

    border:1px solid rgba(255,255,255,.08);

    transition:.25s;

}

textarea::placeholder{

    color:#93aac8;

}

textarea:focus{

    border-color:#00d4ff;

    box-shadow:

    0 0 15px rgba(0,212,255,.35);

}

/*=========================
      CHECKBOX
=========================*/

.check{

    display:flex;

    align-items:center;

    gap:10px;

    color:#d8e4f4;

    cursor:pointer;

}

.check input{

    width:18px;

    height:18px;

}

/*=========================
      BUTTON
=========================*/

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:#fff;

    font-size:15px;

    font-weight:700;

    transition:.25s;

}

button:first-of-type{

    background:

    linear-gradient(135deg,#00c853,#009245);

}

button:last-of-type{

    background:

    linear-gradient(135deg,#00c6ff,#0072ff);

}

button:hover{

    transform:translateY(-2px);

    box-shadow:

    0 12px 25px rgba(0,0,0,.35);

}

button:active{

    transform:scale(.98);

}

/*=========================
      TOAST
=========================*/

#notif{

    position:fixed;

    top:20px;

    right:20px;

    background:#00c853;

    color:#fff;

    padding:14px 20px;

    border-radius:12px;

    font-weight:bold;

    box-shadow:

    0 12px 30px rgba(0,0,0,.35);

    opacity:0;

    transform:translateX(120%);

    transition:.35s;

    z-index:9999;

}

#notif.show{

    opacity:1;

    transform:translateX(0);

}

/*=========================
      LOADING
=========================*/

#loading{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(4px);

    color:#fff;

    font-size:22px;

    font-weight:bold;

    opacity:0;

    pointer-events:none;

    transition:.3s;

    z-index:10000;

}

#loading.show{

    opacity:1;

    pointer-events:auto;

}

/*=========================
      SCROLLBAR
=========================*/

textarea::-webkit-scrollbar{

    width:10px;

}

textarea::-webkit-scrollbar-track{

    background:#081425;

}

textarea::-webkit-scrollbar-thumb{

    border-radius:20px;

    background:

    linear-gradient(#00d4ff,#0072ff);

}

/*=========================
      RESPONSIVE
=========================*/

@media(max-width:700px){

    body{

        padding:15px;

    }

    .container{

        padding:22px;

    }

    .badge{

        position:static;

        display:inline-block;

        margin-bottom:15px;

    }

    .header{

        padding-top:0;

    }

    .title{

        font-size:28px;

    }

}

/*=========================================
        PARADISE LAB PREMIUM
             PART 3
=========================================*/


/* Glow Badge */

.badge{

    animation:badgeGlow 3s ease-in-out infinite alternate;

}

@keyframes badgeGlow{

    from{

        box-shadow:
        0 0 10px rgba(0,212,255,.25);

    }

    to{

        box-shadow:
        0 0 18px rgba(0,212,255,.55),
        0 0 35px rgba(0,212,255,.25);

    }

}


/* Container Hover */

.container{

    transition:.35s;

}

.container:hover{

    transform:translateY(-2px);

    box-shadow:
    0 25px 55px rgba(0,0,0,.45);

}


/* Section Hover */

.section{

    transition:.25s;

    border-radius:14px;

}

.section:hover{

    background:rgba(255,255,255,.025);

}


/* Smooth Select */

select{

    transition:
    border-color .25s,
    box-shadow .25s,
    background .25s;

}

select:hover{

    background:#0c1b32;

}


/* Smooth Textarea */

textarea{

    transition:
    border-color .25s,
    box-shadow .25s,
    background .25s;

}

textarea:hover{

    background:#0c1b32;

}


/* Premium Button */

button{

    overflow:hidden;

    position:relative;

}

button::before{

    content:"";

    position:absolute;

    top:0;

    left:-120%;

    width:60%;

    height:100%;

    background:

    linear-gradient(

        90deg,

        transparent,

        rgba(255,255,255,.28),

        transparent

    );

}

button:hover::before{

    left:160%;

    transition:.8s;

}


/* Fade In */

.container{

    animation:fadeUp .6s ease;

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(18px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}


/* Premium Scrollbar */

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-track{

    background:#07111f;

}

::-webkit-scrollbar-thumb{

    border-radius:20px;

    background:

    linear-gradient(

        #00d4ff,

        #006eff

    );

}

::-webkit-scrollbar-thumb:hover{

    background:

    linear-gradient(

        #43e8ff,

        #0095ff

    );

}


/* Selection */

::selection{

    background:#00bfff;

    color:#fff;

}


/* Focus Animation */

button:focus,

select:focus,

textarea:focus{

    animation:pulse .4s;

}

@keyframes pulse{

    0%{

        transform:scale(.99);

    }

    50%{

        transform:scale(1.01);

    }

    100%{

        transform:scale(1);

    }

}

/* GENERATE EMOJI PREFIX */
function getEmoji(){
    return emojiList[Math.floor(Math.random() * emojiList.length)];
}

/* LOADING */
function showLoading(state){
    document.getElementById("loading").classList.toggle("show", state);
}

/* GENERATE */
async function generateText(){

const lang = document.getElementById("language").value;
const category = document.getElementById("category").value;
const result = document.getElementById("result");
const useEmoji = document.getElementById("useEmoji").checked;

if(!lang){
    alert("Pilih bahasa dulu!");
    return;
}

if(!category){
    alert("Pilih kategori dulu!");
    return;
}

showLoading(true);

let text = database[category][Math.floor(Math.random() * database[category].length)];

try{

if(lang !== "id"){
    const response = await fetch(
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=id&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`
    );

    const data = await response.json();
    text = data[0][0][0];
}

/* 🔥 EMOJI PREFIX */
if(useEmoji){
    text = getEmoji() + " " + text;
}

result.value = text;

}catch(e){
    result.value = "Gagal translate.";
}

showLoading(false);

}

/* COPY */
function copyText(){

const text = document.getElementById("result");
if(!text.value.trim()) return;

text.select();
document.execCommand("copy");

const notif = document.getElementById("notif");
notif.classList.add("show");

setTimeout(()=>{
    notif.classList.remove("show");
},2000);

}

</script>
